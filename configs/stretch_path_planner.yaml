# Example offline BEV path-planner config for Hello Robot Stretch.
#
# Coordinate convention used by this planner:
# - Goal x is lateral, positive to the robot's right, in meters.
# - Goal y is forward, positive in front of the robot, in meters.
# - BEV maps are visualized with forward at the top, robot/reference at bottom center.
# - Traversability score 1.0 means easiest to traverse, 0.0 means least traversable,
#   and -1.0 means unknown/unobserved.
#
# Per-frame values must match the exact RGB/depth observation being planned from.
# For Stretch, camera intrinsics are stable for a fixed stream resolution, but
# camera pose changes whenever the base/head moves.

samtp:
  # SAM-TP model config path. Relative paths are resolved from the repository root.
  config_path: sam2/configs/sam2.1_inference_tiny/sam2.1_custom2.yaml

  # SAM-TP checkpoint path. The checkpoint is not tracked in git; download it
  # as described in README.md before running without --score-map.
  checkpoint_path: sam2_logs/configs/sam2.1_training_tiny/sam2_training_custom2_freezeNoneNone_f57.yaml/checkpoints/checkpoint_2.pt

  # Threshold passed into SAM2ImagePredictor. Keep 0.0 to preserve raw logit
  # behavior used by the current SAM-TP inference path.
  score_thresh: 0.0

  # If true, SAM-TP asks SAM2 for multiple masks and uses the highest-IoU one.
  # The current Stretch pipeline uses false.
  multimask: false

  # Converts SAM-TP logits to traversability before BEV projection.
  # Supported values: sigmoid, minmax, none.
  score_transform: sigmoid

camera:
  # 3x3 pinhole intrinsics matrix for the RGB/depth images.
  # These values were captured from the current Stretch head RGB-D stream at
  # image shape H=640, W=480. Replace them if your image resolution, camera,
  # or stream scaling changes. CLI --camera-k, or per-observation
  # camera.intrinsics / camera.intrinsics_path, overrides this fallback.
  intrinsics:
    - [606.1235961914062, 0.0, 247.56045532226562]
    - [0.0, 606.080078125, 325.16796875]
    - [0.0, 0.0, 1.0]

  # Optional path to a 3x3 intrinsics matrix stored as .npy/.json/.yaml.
  # Use this instead of camera.intrinsics if you prefer not to inline K.
  # intrinsics_path: data/stretch_camera_K.npy

  # 4x4 camera-to-world pose fallback for the optical camera frame, also known
  # as T_world_camera. This is used when neither CLI --camera-pose nor a
  # per-observation camera.pose / camera.pose_path is provided.
  #
  # For a fixed camera setup, keep this matrix in the config and omit
  # --camera-pose. For a moving robot head/base, replace this with the exact
  # pose for the captured frame, or pass that frame's .npy pose with
  # --camera-pose. If observation_fusion.enabled is true, each fused observation
  # must have a pose in the same world/odom frame.
  #
  # The values below are an example Stretch head-camera pose captured from the
  # current prototype stream. Recalibrate or override them when the head angle,
  # camera mount, or robot/world frame changes.
  pose:
    - [0.0011988871, -0.42378852, 0.90576035, 0.049710721]
    - [-0.99995166, -0.0093474351, -0.0030499310, -0.0032095660]
    - [0.0097590620, -0.90571290, -0.42377925, 1.3030162]
    - [0.0, 0.0, 0.0, 1.0]

  # Optional path to T_world_camera stored as .npy/.json/.yaml. Use this instead
  # of camera.pose if the matrix is generated by calibration or capture tooling.
  # pose_path: data/stretch_T_world_camera.npy

  # Optional calibrated transform from robot base to optical camera frame. Use
  # this only if each observation provides robot_pose_xy_yaw instead of an
  # explicit T_world_camera. The planner computes:
  # T_world_camera = T_world_base @ T_base_camera.
  # T_base_camera: [[...], [...], [...], [0.0, 0.0, 0.0, 1.0]]

robot:
  # Human-readable robot name stored in metadata. It does not affect planning.
  name: stretch

  # Optional fallback base pose as [x_m, y_m, yaw_rad] in a world/odom frame.
  # The base frame convention is +x forward, +y left, +z up.
  # Prefer per-observation robot_pose_xy_yaw when fusing past observations.
  # pose_xy_yaw: [0.0, 0.0, 0.0]

projection:
  # Ground plane height in the same world frame as T_world_camera. RGB rays are
  # intersected with world_z = ground_z; depth obstacle heights are measured
  # relative to this plane.
  ground_z: 0.0

  # Local BEV meters per pixel. Smaller values give finer maps but more pixels.
  resolution_m_per_px: 0.03

  # Forward distance, in meters, represented by each local BEV observation.
  forward_range_m: 4.0

  # Half-width, in meters, represented left and right of the reference axis.
  # The full BEV width is 2 * side_range_m.
  side_range_m: 2.0

  # Maximum XY ray distance used when projecting RGB scores to the ground plane.
  # Use <= 0 to disable this clipping.
  max_ray_distance_m: 6.0

depth:
  # If true and depth is provided, build a depth-derived BEV traversability map.
  enabled: true

  # Unit for depth inputs. Use "m" for float arrays in meters and "mm" for
  # 16-bit depth images in millimeters.
  unit: m

  # Ignore depth points farther than this distance because they are less reliable.
  reliable_depth_m: 2.4

  # Ignore depth points closer than this distance to remove invalid near values.
  min_depth_m: 0.15

  # Height above the ground plane that is treated as fully non-traversable.
  # Heights between 0 and this value are linearly mapped to traversability.
  obstacle_height_thresh_m: 0.20

fusion:
  # Default modality for planning. CLI --mode overrides this.
  # rgb = SAM-TP projection only; depth = depth-height map only;
  # rgbd = weighted RGB/depth fusion.
  mode: rgbd

  # RGB traversability weight when both RGB and depth observe the same BEV cell.
  rgb_weight: 0.2

  # Depth traversability weight when both RGB and depth observe the same BEV cell.
  depth_weight: 0.8

  # If true, RGB-D mode leaves RGB-only cells unknown unless depth also observes
  # that cell. This matches the current live Stretch planner behavior.
  require_depth_for_rgbd: true

observation_fusion:
  # If true, fuse multiple observations from the observations list into one BEV.
  # Every fused observation must have a camera pose in the same world/odom frame.
  enabled: false

  # Maximum number of latest observations to fuse when enabled.
  max_observations: 4

  # Which observation defines the final planning frame. "last" is typical for
  # online use; "first" is useful for offline replay; an integer index is also
  # accepted by the code.
  reference: last

planning:
  # Default planning mode. Usually keep this equal to fusion.mode.
  # CLI --mode overrides this value.
  mode: rgbd

goal:
  # Default goal x in meters, positive to the robot's right. CLI --goal-x overrides.
  x_m: -2.0

  # Default goal y in meters, positive forward. CLI --goal-y overrides.
  y_m: 8.0

planner:
  # Size of the square planner grid in pixels. The local BEV/cost map is resized
  # to this grid before path sampling and scoring.
  grid_size: 240

  # Cost assigned to unknown cells. Lower values allow paths through unexplored
  # space; higher values make unknown cells more conservative.
  unknown_cost: 0.2

  # Gaussian smoothing kernel for the cost map. Use <= 1 to disable smoothing.
  smooth_kernel: 3

  # Number of edge goals used to build the fixed polynomial path bank.
  num_goals: 30

  # Number of midpoint samples per sampled edge goal.
  num_mid_points_per_goal: 20

  # Number of arc-length samples per path. The output path has this value + 1 points.
  path_num_samples: 100

  # Square footprint size, in planner pixels, used for path filtering and cost.
  footprint_px: 18

  # A path point is considered bad when enough footprint cells have cost >= this.
  threshold_cost: 0.50

  # Fraction of footprint cells allowed to exceed threshold_cost before rejecting
  # the path at that path point.
  threshold_points_ratio: 0.05

  # Number of early path points checked by high-cost filtering.
  number_of_points_to_filter: 60

  # Exponential weighting factor used by footprint path cost computation.
  alpha: 1.0

  # Number of lowest-cost paths considered when constructing the final path.
  best_k: 12

  # If true, cluster filtered candidate paths and choose the branch closest to
  # the goal direction before final cost selection.
  use_clustering: true

  # Upper bound for adaptive k-means path clusters.
  max_clusters: 4

  # Merge clusters whose path-heading angles differ by less than this many degrees.
  cluster_angle_threshold_deg: 40.0

  # Random seed for repeatable fixed path-bank sampling. Use null for non-deterministic.
  random_seed: 42

  # If true, explicitly inject the clipped goal pixel into the sampled path bank.
  # The current live planner keeps this false and uses the fixed bank plus clustering.
  include_goal_in_path_bank: false

  # If true, include randomly sampled edge goals in the path bank.
  include_random_goals: true

output:
  # Default output directory. Relative paths are resolved from the repository root.
  dir: outputs/path_planner

# Optional multi-frame config form. If --image or --score-map is passed on the
# CLI, this list is ignored and a single CLI observation is used. Each entry can
# provide image, depth, score_map, camera.pose_path, and robot_pose_xy_yaw.
#
# Example:
# observations:
#   - name: frame_0001
#     image: data/frame_0001_rgb.png
#     depth: data/frame_0001_depth_m.npy
#     score_map: data/frame_0001_samtp_traversability.npy
#     score_map_type: traversability
#     camera:
#       pose_path: data/frame_0001_T_world_camera.npy
#     robot_pose_xy_yaw: [0.0, 0.0, 0.0]
observations: []
